name: Ejecucion de Tests Automatizados

on: [push]

jobs:
  test-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Descargando el codigo del repo
        uses: actions/checkout@v4

      - name: Instalando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando Selenium y Pytest
        run: |
          pip install selenium pytest webdriver-manager

      - name: Corriendo mis tests de QA
        run: |
          pytest
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      
      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@master
        with:
          chromedriver-version: '123.0.6312.4'  # Match your Chrome version
